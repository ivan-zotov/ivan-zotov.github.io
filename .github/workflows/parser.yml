name: Update Matches

on:
  schedule:
    - cron: '0 */4 * * *'   # каждые 4 часа
  workflow_dispatch:        # можно запускать вручную

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Клонируем репозиторий
        uses: actions/checkout@v4

      - name: 🐍 Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Устанавливаем зависимости
        run: |
          pip install -r requirements.txt

      - name: 🚀 Запускаем скрипт
        run: python parser.py

      - name: 💾 Коммитим изменения
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add matches.json
          git commit -m "auto update matches" || echo "no changes"
          git push
