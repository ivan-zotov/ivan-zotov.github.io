name: Update Matches

on:
  schedule:
    - cron: '17 */4 * * *'   # 🔥 каждые 4 часа (НЕ на нулевой минуте)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-parser:
    runs-on: ubuntu-latest

    steps:
      # 1. Забираем код
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Установка зависимостей
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Запуск парсера
      - name: 🚀 Run parser
        run: python parser.py

      # 5. Коммит и пуш
      - name: 💾 Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add matches.json

          git diff --cached --quiet || git commit -m "auto update matches"

          git push